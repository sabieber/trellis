name: trellis
services:
  db:
    container_name: trellis-db
    image: postgres:17.2
    ports:
      - "5432:5432"
    command: postgres -c max_connections=500
    env_file:
      - ./.env
    volumes:
      - ./db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 30s
      timeout: 30s
      retries: 5
    networks:
      - trellis-network

  app:
    container_name: trellis-app
    restart: always
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5174:5174"
    env_file:
      - ./.env
    environment:
      # Override the .env localhost URL so the app reaches the db service.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_USER}
    networks:
      - trellis-network

networks:
  trellis-network:
    driver: bridge
    name: trellis-network
